name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}/.mise/config.toml

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@035e80a7d4355d5f087ffb95db9e4a0944c04e56 # use-mise-action-v1.1.3

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Find package
        id: find-package
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_NAME="${RELEASE_TAG_NAME%-*}"
          echo "Package is $PACKAGE_NAME"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: pnpm --filter ./packages/${{ steps.find-package.outputs.package_name }} publish --no-git-checks
