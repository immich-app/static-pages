name: Test
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app_name: ['root', 'api', 'awesome', 'my', 'get', 'buy', 'datasets', 'survey']

    defaults:
      run:
        working-directory: apps/${{ matrix.app_name }}.immich.app

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: './.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install
        run: pnpm install

      - name: Lint
        run: pnpm lint
        if: ${{ !cancelled() }}

      - name: Format
        run: pnpm format
        if: ${{ !cancelled() }}

      - name: Type check
        run: pnpm check
        if: ${{ !cancelled() }}

      - name: Test
        run: pnpm test
        if: ${{ !cancelled() }}

      - name: Check for app backend
        id: check-backend
        run: |
          if [ -d "backend" ]; then
            echo "has_backend=true" >> $GITHUB_ENV
          else
            echo "has_backend=false" >> $GITHUB_ENV
          fi

      - name: Test backend
        if: ${{ env.has_backend == 'true' }}
        working-directory: 'apps/${{ matrix.app_name }}.immich.app/backend'
        run: |
          pnpm install
          pnpm test

      - name: Install Playwright browsers
        if: ${{ matrix.app_name == 'survey' && !cancelled() }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Start wrangler and Vite
        if: ${{ matrix.app_name == 'survey' && !cancelled() }}
        run: |
          (cd backend && npx wrangler d1 migrations apply survey --local --config wrangler-dev.jsonc)
          (cd backend && npx wrangler dev --config wrangler-dev.jsonc --port 8787) &
          pnpm dev &
          timeout 60 bash -c 'until curl -sf http://localhost:8787/api/auth/me; do sleep 1; done'
          timeout 60 bash -c 'until curl -sf http://localhost:5173 >/dev/null 2>&1; do sleep 1; done'

      - name: E2E tests
        if: ${{ matrix.app_name == 'survey' && !cancelled() }}
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: ${{ matrix.app_name == 'survey' && failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: apps/survey.immich.app/test-results/
          retention-days: 7
