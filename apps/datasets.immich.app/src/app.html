<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Immich - Dataset Uploader</title>
    <meta name="theme-color" content="currentColor" />
    <meta name="description" content="Help improve Immich by contributing to our dataset" />

    <!-- Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Immich Dataset Uploader" />
    <meta property="og:description" content="Help improve Immich by contributing to our dataset" />
    <meta property="og:image" content="/img/social-preview.png" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Immich Dataset Uploader" />
    <meta name="twitter:description" content="Help improve Immich by contributing to our dataset" />
    <meta name="twitter:image" content="/img/social-preview.png" />
    <script>
      try {
        if (JSON.parse(localStorage.getItem('immich-ui-theme')) === 'light') {
          document.documentElement.classList.remove('dark');
          document.documentElement.classList.add('light');
        }
      } catch {
        // noop
      }
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-light text-dark">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
