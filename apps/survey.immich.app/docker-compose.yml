services:
  survey:
    build: .
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - DATABASE_URL=${DATABASE_URL:-/data/survey.db}
      - SESSION_SECRET=${SESSION_SECRET}
      - PASSWORD_SECRET=${PASSWORD_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # OIDC (optional)
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      - OIDC_ROLE_CLAIM=${OIDC_ROLE_CLAIM:-groups}
      - OIDC_ROLE_MAP_ADMIN=${OIDC_ROLE_MAP_ADMIN:-survey-admin}
      - OIDC_ROLE_MAP_EDITOR=${OIDC_ROLE_MAP_EDITOR:-survey-editor}
    volumes:
      - survey-data:/data
    restart: unless-stopped

  # Optional: Use PostgreSQL instead of SQLite
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: survey
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-survey}
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  survey-data:
  pgdata:
