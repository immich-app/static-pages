[tools]
opentofu = "1.12.0"
terragrunt = "1.0.5"
node = "24.16"
pnpm = "11.4.0"
wrangler = "4.95.0"

[tasks.deploy]
run = "wrangler pages deploy ${BUILD_DIR} --project-name=${PROJECT_NAME} --branch=${BRANCH_NAME}"

[tasks.tg]
run = "op run '--env-file={{config_root}}/deployment/.env' -- terragrunt"
description = "Wrapper for terragrunt"
dir = "{{cwd}}"

[tasks."tg:fmt"]
run = "mise run tg hcl format"
description = "Format terragrunt files"

[tasks.tf]
run = "mise run tg run --all"
description = "Wrapper for terragrunt run-all"
dir = "{{cwd}}"

[tasks."tf:fmt"]
run = "tofu fmt -recursive tf/"
description = "Format terraform files"

[tasks."tf:init"]
run = "mise run tf init -- -reconfigure"
dir = "{{cwd}}"

[tasks."tf:plan"]
run = "mise run tf plan"
dir = "{{cwd}}"

[tasks."tf:apply"]
run = "mise run tf apply"
dir = "{{cwd}}"

[tasks."tf:destroy"]
run = "mise run tf destroy"
dir = "{{cwd}}"

[tasks.dev]
description = "Run a dev server"
usage = '''
arg "<app>" help="Target app" {
  choices "api" "awesome" "buy" "datasets" "get" "my" "root" "ui"
  default "root"
}
'''
run = [
  "pnpm --filter @immich/ui --filter @immich/svelte-markdown-preprocess build",
  { task = "watch-and-open", args = ["{{usage.app}}"] }
]

[tasks."watch-and-open"]
description = "Run watch and open in parallel"
usage = '''
arg "<app>" help="Target app"
'''
depends = [ { task = "watch" }, { task = "open", args = ["{{usage.app}}"] } ]

[tasks.watch]
run = "pnpm --filter @immich/ui --filter @immich/svelte-markdown-preprocess --parallel run watch"

[tasks.open]
usage = '''
arg "<app>" help="Target app"
'''
run = [
  "sleep 3",
  'echo "Launching apps/{{usage.app}}.immich.app..."',
  'pnpm --filter "{{usage.app}}.immich.app" start --open'
]

[settings]
experimental = true
idiomatic_version_file_enable_tools = []
